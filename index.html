<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <style>

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 60px auto;
      padding: 0 1rem;
      background: #464646;
      color: #ffffff;
    }
 
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 1.25rem; }
 
    .add-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
 
    input {
      flex: 1;
      padding: 8px 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }
 
    input:focus { border-color: #888; }
 
    button {
      padding: 8px 14px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }
 
    button:hover { background: #f2f2f2; }
 
    ul { list-style: none; padding: 0; margin: 0; }
 
    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 15px;
    }
 
    .del {
      background: none;
      border: none;
      color: #bbb;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
 
    .del:hover { color: #c0392b; }

  </style>

</head>

<body>
  <h1>To-Do List</h1>
  <div class="add-row">
    <input id="inp" type="text" placeholder="Add a task..." />
    <button onclick="add()">Add</button>
  </div>
  <ul id="list"></ul>
 
  <script>
    let todos = JSON.parse(localStorage.getItem('todo.json') || '[]');
 
    function save() {
      localStorage.setItem('todo.json', JSON.stringify(todos));
    }
 
    function render() {
      document.getElementById('list').innerHTML = todos.map((t, i) => `
        <li>
          <span>${t}</span>
          <button class="del" onclick="remove(${i})">&#x2715;</button>
        </li>
      `).join('');
    }
 
    function add() {
      const inp = document.getElementById('inp');
      const text = inp.value.trim();
      if (!text) return;
      todos.push(text);
      inp.value = '';
      save(); render();
    }
 
    function remove(i) {
      todos.splice(i, 1);
      save(); render();
    }
 
    document.getElementById('inp').addEventListener('keydown', e => {
      if (e.key === 'Enter') add();
    });
 
    render();
  </script>
</body>
</html>
